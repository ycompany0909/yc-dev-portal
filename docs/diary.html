    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .month-nav button {
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
      width: 36px; height: 36px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;

    .month-nav button:active { background: #334155; }
    .month-title { font-size: 16px; font-weight: 700; color: #f1f5f9; }

    /* Calendar grid */
    .calendar {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .cal-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: #0f172a;
    }
    .cal-header span {
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      color: #475569;
      padding: 8px 0;
    }
    .cal-body {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }
    .cal-cell {
      min-height: 52px;
      padding: 6px;
      border-top: 1px solid #334155;
      border-right: 1px solid #334155;
      cursor: default;
      position: relative;
    }
    .cal-cell:nth-child(7n) { border-right: none; }
    .cal-cell.has-entry { cursor: pointer; }
    .cal-cell.has-entry:active { background: #334155; }
    .cal-cell.today .day-num { background: #2563eb; color: #fff; border-radius: 50%; }
    .cal-cell.selected { background: #1e3a5f; }
    .day-num {
      font-size: 12px;
      font-weight: 600;
      color: #475569;
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
    }
    .cal-cell.has-entry .day-num { color: #e2e8f0; }
    .cal-cell.other-month .day-num { color: #1e293b; }
    .dots {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      margin-top: 3px;
    }
    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
    }
    .dot-op { background: #3b82f6; }
    .dot-workers { background: #a855f7; }
    .dot-portal { background: #22c55e; }
    .dot-other { background: #f59e0b; }

      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      overflow: hidden;
      display: none;
    }
    .entry-panel.visible { display: block; }

      font-size: 14px;
      font-weight: 700;
      color: #f1f5f9;

    .repo-tag {

// ======= Calendar logic =======
let currentYear = 2026;
let currentMonth = 4; // 0-indexed → 4 = May
let selectedDate = null;

function getEntryDots(dateStr) {
  const entry = DIARY[dateStr];
  if (!entry) return [];
  const dots = new Set();
  entry.forEach(e => {
    if (e.tag === 'tag-op') dots.add('dot-op');
    else if (e.tag === 'tag-workers') dots.add('dot-workers');
    else if (e.tag === 'tag-portal' || e.tag === 'tag-setagaya') dots.add('dot-portal');
    else dots.add('dot-other');
  });
  return [...dots];
}

function renderCalendar() {
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('month-title').textContent = `${currentYear}年 ${months[currentMonth]}`;

  const today = new Date();
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const daysInPrev = new Date(currentYear, currentMonth, 0).getDate();

  let html = '';
  let dayCount = 0;

  // prev month cells
  for (let i = firstDay - 1; i >= 0; i--) {
    const d = daysInPrev - i;
    html += `<div class="cal-cell other-month"><div class="day-num">${d}</div></div>`;
    dayCount++;
  }

  // current month
  for (let d = 1; d <= daysInMonth; d++) {
    const mm = String(currentMonth + 1).padStart(2, '0');
    const dd = String(d).padStart(2, '0');
    const dateStr = `${currentYear}-${mm}-${dd}`;
    const hasEntry = !!DIARY[dateStr];
    const isToday = (today.getFullYear() === currentYear && today.getMonth() === currentMonth && today.getDate() === d);
    const isSelected = selectedDate === dateStr;

    const dots = getEntryDots(dateStr);
    const dotsHtml = dots.map(cls => `<div class="dot ${cls}"></div>`).join('');

    let cls = 'cal-cell';
    if (hasEntry) cls += ' has-entry';
    if (isToday) cls += ' today';
    if (isSelected) cls += ' selected';

    html += `<div class="${cls}" onclick="${hasEntry ? `showEntry('${dateStr}')` : ''}">
      <div class="day-num">${d}</div>
      <div class="dots">${dotsHtml}</div>
    </div>`;
    dayCount++;
  }

  // next month cells
  const remaining = 42 - dayCount;
  for (let d = 1; d <= remaining; d++) {
    html += `<div class="cal-cell other-month"><div class="day-num">${d}</div></div>`;
  }

  document.getElementById('cal-body').innerHTML = html;
}

function showEntry(dateStr) {
  selectedDate = dateStr;
  renderCalendar();

  const entry = DIARY[dateStr];
  const panel = document.getElementById('entry-panel');
  const noMsg = document.getElementById('no-entry-msg');

  // Date label
  const d = new Date(dateStr + 'T00:00:00');
  const weekdays = ['日','月','火','水','木','金','土'];
  const label = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${weekdays[d.getDay()]}）`;
  const commitCount = entry.reduce((sum, e) => sum + e.items.length, 0);
  document.getElementById('entry-date-label').innerHTML = `${label}<span>${commitCount}件の開発</span>`;

  if (!entry || entry.length === 0) {
    panel.classList.remove('visible');
    noMsg.style.display = 'block';
    return;
  }

  noMsg.style.display = 'none';
  panel.classList.add('visible');

  const typeLabels = { feat: 'feat', fix: 'fix', docs: 'docs', refactor: 'rfct', init: 'init' };
  let html = '';
  entry.forEach(section => {
    const items = section.items.map(item => {
      const typeCls = `type-${item.type}`;
      const typeText = typeLabels[item.type] || item.type;
      return `<li class="feat-item"><span class="feat-type ${typeCls}">${typeText}</span>${item.text}</li>`;
    }).join('');
    html += `<div class="entry-section">
      <span class="repo-tag ${section.tag}">${section.repo}</span>
      <ul class="feat-list">${items}</ul>
    </div>`;
  });
  document.getElementById('entry-content').innerHTML = html;

  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function prevMonth() {
  currentMonth--;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
}
function nextMonth() {
  currentMonth++;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  renderCalendar();
}

// Stats
function calcStats() {
  const days = Object.keys(DIARY).length;
  const commits = Object.values(DIARY).reduce((sum, day) =>
    sum + day.reduce((s, sec) => s + sec.items.length, 0), 0);
  const repos = new Set(Object.values(DIARY).flatMap(day => day.map(s => s.repo))).size;
  document.getElementById('stat-days').textContent = days;
  document.getElementById('stat-commits').textContent = commits;
  document.getElementById('stat-repos').textContent = repos;
}

calcStats();
renderCalendar();

// Auto-show latest entry
const latestDate = Object.keys(DIARY).sort().reverse()[0];
if (latestDate) showEntry(latestDate);
</script>
