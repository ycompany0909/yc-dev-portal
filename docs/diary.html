    .month-nav button:active { background: #334155; }
    .month-title { font-size: 16px; font-weight: 700; color: #f1f5f9; }

    .stats-bar {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px;

    .stat-card {

<script>
// ===== TAB SWITCH =====
function switchTab(name, btn) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'memo') renderQuickMemos();
  if (name === 'plan') loadPlan();
  if (name === 'assessment') loadAssessment();
}

// ===== QUICK MEMO (localStorage only) =====
const MEMO_KEY = 'yc_quick_memos';

function getQuickMemos() {
  try { return JSON.parse(localStorage.getItem(MEMO_KEY) || '[]'); }
  catch { return []; }
}
function saveQuickMemos(memos) {
  localStorage.setItem(MEMO_KEY, JSON.stringify(memos));
}
function addQuickMemo() {
  const ta = document.getElementById('quick-memo-text');
  const text = ta.value.trim();
  if (!text) return;
  const memos = getQuickMemos();
  memos.unshift({ ts: Date.now(), text });
  saveQuickMemos(memos);
  ta.value = '';
  renderQuickMemos();
}
function deleteQuickMemo(ts) {
  if (!confirm('このメモを削除しますか？')) return;
  const memos = getQuickMemos().filter(m => m.ts !== ts);
  saveQuickMemos(memos);
  renderQuickMemos();
}
function renderQuickMemos() {
  const memos = getQuickMemos();
  const list = document.getElementById('quick-memo-list');
  if (!memos.length) {
    list.innerHTML = '<div class="memo-empty">まだメモがありません</div>';
    return;
  }
  list.innerHTML = memos.map(m => {
    const d = new Date(m.ts);
    const mm = d.getMonth() + 1, dd = d.getDate();
    const HH = String(d.getHours()).padStart(2,'0'), MM = String(d.getMinutes()).padStart(2,'0');
    const ymd = d.getFullYear() === new Date().getFullYear() ? `${mm}/${dd}` : `${d.getFullYear()}/${mm}/${dd}`;
    const safe = m.text.replace(/</g,'&lt;').replace(/\n/g,'<br>');
    return `<div class="memo-card">
      <div class="memo-meta">
        <span class="memo-date">${ymd} ${HH}:${MM}</span>
        <button class="memo-del" onclick="deleteQuickMemo(${m.ts})" title="削除">×</button>
      </div>
      <div class="memo-text">${safe}</div>
    </div>`;
  }).join('');
}

// ===== PLAN =====
const PLAN_TYPE_LABEL = { learning: '📚 学習', milestone: '🎯 マイルストーン', practice: '🛠 実践' };
const PLAN_TYPE_CLS = { learning: 'tag-learning', milestone: 'tag-milestone', practice: 'tag-workers' };

async function loadPlan() {
  const list = document.getElementById('plan-list');
  const updated = document.getElementById('plan-updated');
  try {
    const res = await fetch('plan.json?t=' + Date.now());
    if (!res.ok) throw new Error('not found');
    const data = await res.json();
    if (data.updated_at) {
      const d = new Date(data.updated_at);
      updated.textContent = `更新: ${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }
    if (!data.plans || !data.plans.length) {
      list.innerHTML = '<div class="plan-empty">プラン未策定。plan.json を更新してください。</div>';
      return;
    }
    const sorted = data.plans.slice().sort((a,b) => a.date.localeCompare(b.date));
    list.innerHTML = sorted.map(p => {
      const typeCls = PLAN_TYPE_CLS[p.type] || 'tag-other';
      const typeLabel = PLAN_TYPE_LABEL[p.type] || p.type;
      return `<div class="plan-card">
        <div class="plan-card-header">
          <span class="plan-date">${p.date}</span>
          <span class="plan-type ${typeCls}">${typeLabel}</span>
        </div>
        <div class="plan-title">${(p.title||'').replace(/</g,'&lt;')}</div>
        ${p.detail ? `<div class="plan-detail">${p.detail.replace(/</g,'&lt;')}</div>` : ''}
      </div>`;
    }).join('');
  } catch {
    list.innerHTML = '<div class="plan-empty">plan.json が読み込めませんでした</div>';
  }
}

// ===== ASSESSMENT (markdown render) =====
async function loadAssessment() {
  const content = document.getElementById('assessment-content');
  try {
    if (!window.marked) {
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/marked/marked.min.js';
        s.onload = resolve; s.onerror = reject;
        document.head.appendChild(s);
      });
    }
    const res = await fetch('skill-assessment.md?t=' + Date.now());
    if (!res.ok) throw new Error('not found');
    const md = await res.text();
    content.innerHTML = marked.parse(md);
  } catch {
    content.innerHTML = '<div class="memo-empty">skill-assessment.md が読み込めませんでした</div>';
  }
}

let currentYear = 2026, currentMonth = 5, selectedDate = null;
let PLANS_BY_DATE = {}; // date string -> [plan]

async function loadPlansForCalendar() {
  try {
    const res = await fetch('plan.json?t=' + Date.now());
    if (!res.ok) return;
    const data = await res.json();
    PLANS_BY_DATE = {};
    (data.plans || []).forEach(p => {
      if (!PLANS_BY_DATE[p.date]) PLANS_BY_DATE[p.date] = [];
      PLANS_BY_DATE[p.date].push(p);
    });
    renderCalendar();
    calcStats();
  } catch {}
}

function getEntryDots(dateStr) {
  const dots = new Set();
  const entry = DIARY[dateStr];
  if (entry) {
    entry.forEach(e => {
      if (e.tag === 'tag-op') dots.add('dot-op');
      else if (e.tag === 'tag-workers') dots.add('dot-workers');
      else if (e.tag === 'tag-portal' || e.tag === 'tag-setagaya') dots.add('dot-portal');
      else dots.add('dot-other');
    });
  }
  const plans = PLANS_BY_DATE[dateStr];
  if (plans) {
    plans.forEach(p => {
      if (p.type === 'learning') dots.add('dot-learning');
      else if (p.type === 'milestone') dots.add('dot-milestone');
      else dots.add('dot-learning');
    });
  }
  return [...dots];
}

function renderCalendar() {
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('month-title').textContent = `${currentYear}年 ${months[currentMonth]}`;
  const today = new Date();
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const daysInPrev = new Date(currentYear, currentMonth, 0).getDate();
  let html = '';
  let dayCount = 0;
  for (let i = firstDay - 1; i >= 0; i--) {
    html += `<div class="cal-cell other-month"><div class="day-num">${daysInPrev - i}</div></div>`;
    dayCount++;
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const mm = String(currentMonth + 1).padStart(2, '0');
    const dd = String(d).padStart(2, '0');
    const dateStr = `${currentYear}-${mm}-${dd}`;
    const hasEntry = !!DIARY[dateStr];
    const hasPlan = !!PLANS_BY_DATE[dateStr];
    const isToday = (today.getFullYear() === currentYear && today.getMonth() === currentMonth && today.getDate() === d);
    const isSelected = selectedDate === dateStr;
    const dots = getEntryDots(dateStr).map(cls => `<div class="dot ${cls}"></div>`).join('');
    let cls = 'cal-cell';
    if (hasEntry) cls += ' has-entry';
    if (hasPlan) cls += ' has-plan';
    if (isToday) cls += ' today';
    if (isSelected) cls += ' selected';
    const onclick = (hasEntry || hasPlan) ? `showEntry('${dateStr}')` : '';
    html += `<div class="${cls}" onclick="${onclick}">
      <div class="day-num">${d}</div><div class="dots">${dots}</div></div>`;
    dayCount++;
  }
  for (let d = 1; d <= 42 - dayCount; d++) {
    html += `<div class="cal-cell other-month"><div class="day-num">${d}</div></div>`;
  }
  document.getElementById('cal-body').innerHTML = html;
}

function showEntry(dateStr) {
  selectedDate = dateStr;
  renderCalendar();
  const entry = DIARY[dateStr];
  const plans = PLANS_BY_DATE[dateStr];
  const panel = document.getElementById('entry-panel');
  const noMsg = document.getElementById('no-entry-msg');
  const d = new Date(dateStr + 'T00:00:00');
  const weekdays = ['日','月','火','水','木','金','土'];
  const label = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${weekdays[d.getDay()]}）`;
  const commitCount = entry ? entry.reduce((sum, e) => sum + e.items.length, 0) : 0;
  const planCount = plans ? plans.length : 0;
  const counterText = [];
  if (commitCount) counterText.push(`${commitCount}件の開発`);
  if (planCount) counterText.push(`${planCount}件の予定`);
  document.getElementById('entry-date-label').innerHTML = `${label}<span>${counterText.join(' / ')}</span>`;

  if (!entry && !plans) {
    panel.classList.remove('visible'); noMsg.style.display = 'block'; return;
  }
  noMsg.style.display = 'none'; panel.classList.add('visible');
  const typeLabels = { feat: 'feat', fix: 'fix', docs: 'docs', refactor: 'rfct', init: 'init', security: 'sec', learning: '学習', milestone: 'MS', practice: '実践' };
  let html = '';
  if (entry) {
    entry.forEach(section => {
      const items = section.items.map(item => {
        return `<li class="feat-item"><span class="feat-type type-${item.type}">${typeLabels[item.type]||item.type}</span>${(item.text||'').replace(/</g,'&lt;')}</li>`;
      }).join('');
      html += `<div class="entry-section"><span class="repo-tag ${section.tag}">${section.repo}</span><ul class="feat-list">${items}</ul></div>`;
    });
  }
  if (plans) {
    const items = plans.map(p => {
      const t = p.type || 'learning';
      return `<li class="feat-item">
        <span class="feat-type type-${t}">${typeLabels[t]||t}</span>
        <div><div>${(p.title||'').replace(/</g,'&lt;')}</div>
        ${p.detail ? `<div style="color:#94a3b8;font-size:11px;margin-top:2px;">${p.detail.replace(/</g,'&lt;')}</div>` : ''}</div>
      </li>`;
    }).join('');
    const tagCls = plans[0].type === 'milestone' ? 'tag-milestone' : 'tag-learning';
    html += `<div class="entry-section"><span class="repo-tag ${tagCls}">🎯 強化計画</span><ul class="feat-list">${items}</ul></div>`;
  }
  document.getElementById('entry-content').innerHTML = html;
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function prevMonth() { if (--currentMonth < 0) { currentMonth = 11; currentYear--; } renderCalendar(); }
function nextMonth() { if (++currentMonth > 11) { currentMonth = 0; currentYear++; } renderCalendar(); }

function calcStats() {
  const days = Object.keys(DIARY).length;
  const commits = Object.values(DIARY).reduce((s, d) => s + d.reduce((s2, sec) => s2 + sec.items.length, 0), 0);
  const planCount = Object.values(PLANS_BY_DATE).reduce((s, arr) => s + arr.length, 0);
  document.getElementById('stat-days').textContent = days;
  document.getElementById('stat-commits').textContent = commits;
  document.getElementById('stat-plans').textContent = planCount;
}

// ===== INIT =====
window.addEventListener('load', () => {
  // memo: Cmd+Enter / Ctrl+Enter
  const ta = document.getElementById('quick-memo-text');
  if (ta) ta.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') addQuickMemo();
  });

  calcStats();
  renderCalendar();
  loadPlansForCalendar();

  const latestDate = Object.keys(DIARY).sort().reverse()[0];
  if (latestDate) showEntry(latestDate);
});
</script>
</body>
