    .month-nav button:active { background: #334155; }
    .month-title { font-size: 16px; font-weight: 700; color: #f1f5f9; }
    .calendar { background: #1e293b; border: 1px solid #334155; border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
    .cal-header { display: grid; grid-template-columns: repeat(7, 1fr); background: #0f172a; }
    .cal-header span { text-align: center; font-size: 11px; font-weight: 600; color: #475569; padding: 8px 0; }
    .cal-body { display: grid; grid-template-columns: repeat(7, 1fr); }
    .cal-cell { min-height: 52px; padding: 6px; border-top: 1px solid #334155; border-right: 1px solid #334155; cursor: default; }
    .cal-cell:nth-child(7n) { border-right: none; }
    .cal-cell.has-entry { cursor: pointer; }
    .cal-cell.has-entry:active { background: #334155; }

    .dot-portal { background: #22c55e; } .dot-other { background: #f59e0b; }

    .entry-section { padding: 12px 16px; border-bottom: 1px solid #1e293b; }
    .entry-section:last-child { border-bottom: none; }
    .repo-tag { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 999px; margin-bottom: 8px; }

<script>
const WORKER_URL = 'https://yc-dev-memo.ycompany0909.workers.dev';

// ===== TAB SWITCH =====
function switchTab(name, btn) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'memo') loadMemos();
  if (name === 'tasks') loadTasks();
}

// ===== MEMO =====
function savePw() {
  const pw = document.getElementById('memo-pw').value;
  if (pw) localStorage.setItem('yc_memo_pw', pw);
}
window.addEventListener('load', () => {
  const saved = localStorage.getItem('yc_memo_pw');
  if (saved) document.getElementById('memo-pw').value = saved;
});

function toggleTag(el) {
  el.classList.toggle('selected');
}

async function submitMemo() {
  const text = document.getElementById('memo-text').value.trim();
  if (!text) return;
  const pw = document.getElementById('memo-pw').value;
  if (!pw) { setStatus('パスワードを入力してください', 'err'); return; }
  const tags = [...document.querySelectorAll('.tag-chip.selected')].map(c => c.dataset.tag);

  const btn = document.getElementById('memo-btn');
  btn.disabled = true;
  setStatus('送信中...');

  try {
    const res = await fetch(`${WORKER_URL}/memo`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw, text, tags }),
    });
    if (res.ok) {
      setStatus('✅ 保存しました（数分で反映）', 'ok');
      document.getElementById('memo-text').value = '';
      document.querySelectorAll('.tag-chip').forEach(c => c.classList.remove('selected'));
      localStorage.setItem('yc_memo_pw', pw);
      setTimeout(loadMemos, 1000);
    } else if (res.status === 401) {
      setStatus('❌ パスワードが違います', 'err');
    } else {
      setStatus('❌ エラーが発生しました', 'err');
    }
  } catch {
    setStatus('❌ 通信エラー', 'err');
  }
  btn.disabled = false;
}

function setStatus(msg, cls = '') {
  const el = document.getElementById('memo-status');
  el.textContent = msg;
  el.className = 'memo-status' + (cls ? ' ' + cls : '');
}

async function loadMemos() {
  try {
    const res = await fetch('memos.json?t=' + Date.now());
    const memos = await res.json();
    const list = document.getElementById('memo-list');
    if (!memos.length) {
      list.innerHTML = '<div class="memo-empty">まだメモがありません</div>';
      return;
    }
    list.innerHTML = memos.map(m => {
      const date = new Date(m.created_at).toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      const tags = (m.tags || []).map(t => `<span class="memo-tag">${t}</span>`).join('');
      return `<div class="memo-card">
        <div class="memo-meta"><span class="memo-date">${date}</span>${tags}</div>
        <div class="memo-text">${m.text.replace(/</g,'&lt;')}</div>
      </div>`;
    }).join('');
  } catch {
    document.getElementById('memo-list').innerHTML = '<div class="memo-empty">読み込みエラー</div>';
  }
}

// ===== TASKS =====
async function loadTasks() {
  try {
    const res = await fetch('tasks.json?t=' + Date.now());
    const data = await res.json();
    const list = document.getElementById('task-list');
    const updated = document.getElementById('tasks-updated');

    if (data.updated_at) {
      const d = new Date(data.updated_at);
      updated.textContent = `更新: ${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    if (!data.tasks || !data.tasks.length) {
      list.innerHTML = `<div class="task-empty">
        タスクがありません
        <div class="task-hint">Claude Terminal で /push-tasks を唱えると更新されます</div>
      </div>`;
      return;
    }

    const priLabel = { high: '高', medium: '中', low: '低' };
    const priCls = { high: 'pri-high', medium: 'pri-medium', low: 'pri-low' };
    list.innerHTML = data.tasks.map(t => {
      const pri = t.priority || 'medium';
      const blocker = t.blocker ? `<div class="task-blocker">🚧 ${t.blocker}</div>` : '';
      return `<div class="task-card">
        <div class="task-header">
          <span class="task-priority ${priCls[pri] || 'pri-medium'}">${priLabel[pri] || pri}</span>
          <div class="task-title">${t.title}</div>
        </div>
        ${t.detail ? `<div class="task-detail">${t.detail}</div>` : ''}
        ${blocker}
      </div>`;
    }).join('');
  } catch {
    document.getElementById('task-list').innerHTML = '<div class="task-empty">読み込みエラー</div>';
  }
}

let currentYear = 2026, currentMonth = 4, selectedDate = null;

function getEntryDots(dateStr) {
  const entry = DIARY[dateStr];
  if (!entry) return [];
  const dots = new Set();
  entry.forEach(e => {
    if (e.tag === 'tag-op') dots.add('dot-op');
    else if (e.tag === 'tag-workers') dots.add('dot-workers');
    else if (e.tag === 'tag-portal' || e.tag === 'tag-setagaya') dots.add('dot-portal');
    else dots.add('dot-other');
  });
  return [...dots];
}

function renderCalendar() {
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('month-title').textContent = `${currentYear}年 ${months[currentMonth]}`;
  const today = new Date();
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const daysInPrev = new Date(currentYear, currentMonth, 0).getDate();
  let html = '';
  let dayCount = 0;
  for (let i = firstDay - 1; i >= 0; i--) {
    html += `<div class="cal-cell other-month"><div class="day-num">${daysInPrev - i}</div></div>`;
    dayCount++;
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const mm = String(currentMonth + 1).padStart(2, '0');
    const dd = String(d).padStart(2, '0');
    const dateStr = `${currentYear}-${mm}-${dd}`;
    const hasEntry = !!DIARY[dateStr];
    const isToday = (today.getFullYear() === currentYear && today.getMonth() === currentMonth && today.getDate() === d);
    const isSelected = selectedDate === dateStr;
    const dots = getEntryDots(dateStr).map(cls => `<div class="dot ${cls}"></div>`).join('');
    let cls = 'cal-cell' + (hasEntry ? ' has-entry' : '') + (isToday ? ' today' : '') + (isSelected ? ' selected' : '');
    html += `<div class="${cls}" onclick="${hasEntry ? `showEntry('${dateStr}')` : ''}">
      <div class="day-num">${d}</div><div class="dots">${dots}</div></div>`;
    dayCount++;
  }
  for (let d = 1; d <= 42 - dayCount; d++) {
    html += `<div class="cal-cell other-month"><div class="day-num">${d}</div></div>`;
  }
  document.getElementById('cal-body').innerHTML = html;
}

function showEntry(dateStr) {
  selectedDate = dateStr;
  renderCalendar();
  const entry = DIARY[dateStr];
  const panel = document.getElementById('entry-panel');
  const noMsg = document.getElementById('no-entry-msg');
  const d = new Date(dateStr + 'T00:00:00');
  const weekdays = ['日','月','火','水','木','金','土'];
  const label = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${weekdays[d.getDay()]}）`;
  const commitCount = entry.reduce((sum, e) => sum + e.items.length, 0);
  document.getElementById('entry-date-label').innerHTML = `${label}<span>${commitCount}件の開発</span>`;
  if (!entry || !entry.length) {
    panel.classList.remove('visible'); noMsg.style.display = 'block'; return;
  }
  noMsg.style.display = 'none'; panel.classList.add('visible');
  const typeLabels = { feat: 'feat', fix: 'fix', docs: 'docs', refactor: 'rfct', init: 'init' };
  let html = '';
  entry.forEach(section => {
    const items = section.items.map(item => {
      return `<li class="feat-item"><span class="feat-type type-${item.type}">${typeLabels[item.type]||item.type}</span>${item.text}</li>`;
    }).join('');
    html += `<div class="entry-section"><span class="repo-tag ${section.tag}">${section.repo}</span><ul class="feat-list">${items}</ul></div>`;
  });
  document.getElementById('entry-content').innerHTML = html;
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function prevMonth() { if (--currentMonth < 0) { currentMonth = 11; currentYear--; } renderCalendar(); }
function nextMonth() { if (++currentMonth > 11) { currentMonth = 0; currentYear++; } renderCalendar(); }

function calcStats() {
  const days = Object.keys(DIARY).length;
  const commits = Object.values(DIARY).reduce((s, d) => s + d.reduce((s2, sec) => s2 + sec.items.length, 0), 0);
  const repos = new Set(Object.values(DIARY).flatMap(d => d.map(s => s.repo))).size;
  document.getElementById('stat-days').textContent = days;
  document.getElementById('stat-commits').textContent = commits;
  document.getElementById('stat-repos').textContent = repos;
}

calcStats();
renderCalendar();
const latestDate = Object.keys(DIARY).sort().reverse()[0];
if (latestDate) showEntry(latestDate);
